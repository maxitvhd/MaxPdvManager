<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TvDoor Player</title>
    <!-- Fabric.js para renderizar layouts criados no editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        #screen {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pairing-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            text-align: center;
            padding: 40px;
            animation: fadeIn 1s ease;
        }

        #pairing-screen .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #6c63ff, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #pairing-screen .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 50px;
        }

        .pair-box {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 480px;
            width: 100%;
        }

        .pair-box h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .pair-box p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .pair-box p span {
            color: #48dbfb;
            font-weight: 700;
        }

        #code-input {
            padding: 14px 20px;
            border-radius: 10px;
            border: 2px solid rgba(108, 99, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 10px;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }

        #code-input:focus {
            border-color: #6c63ff;
        }

        #code-input::placeholder {
            letter-spacing: 3px;
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.25);
        }

        .pair-btn {
            margin-top: 20px;
            padding: 14px;
            width: 100%;
            background: linear-gradient(135deg, #6c63ff, #48dbfb);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .pair-btn:hover {
            opacity: 0.85;
        }

        #pair-error {
            margin-top: 14px;
            color: #f87171;
            font-size: 0.85rem;
            display: none;
        }

        #pair-loading {
            margin-top: 14px;
            color: #48dbfb;
            font-size: 0.85rem;
            display: none;
        }

        .media-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            animation: fadeIn 0.5s ease;
        }

        /* Container para canvas do Fabric.js */
        #fabric-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        #fabric-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.6);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        body:hover #status-bar {
            opacity: 1;
        }

        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #6c63ff, #48dbfb);
            width: 0%;
            transition: width linear;
            z-index: 1000;
        }

        .status-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #f59e0b;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        .status-dot.online {
            background: #10b981;
            animation: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }
    </style>
</head>

<body>
    <div id="screen">
        <div id="pairing-screen">
            <div class="logo">TvDoor</div>
            <div class="subtitle">Digital Signage Player</div>
            <div class="pair-box">
                <h2>Código de Pareamento</h2>
                <p>
                    No painel, acesse <span>TvDoor → Players</span> e crie um novo player.<br>
                    Digite abaixo o código de 6 letras gerado.
                </p>
                <input id="code-input" type="text" maxlength="6" placeholder="XXXXXX" autocomplete="off"
                    autocorrect="off" spellcheck="false" />
                <button class="pair-btn" onclick="doParear()">Conectar Player</button>
                <div id="pair-error"></div>
                <div id="pair-loading">⏳ Verificando código...</div>
            </div>
        </div>
    </div>

    <!-- Canvas wrapper para Fabric.js -->
    <div id="fabric-wrapper">
        <canvas id="fabric-canvas"></canvas>
    </div>

    <div id="status-bar">
        <span id="status-label"><span class="status-dot"></span> Aguardando...</span>
        <span id="now-label"></span>
        <span>TvDoor Player v2.0</span>
    </div>
    <div id="progress-bar"></div>

    <script>
        const BASE_URL = window.location.origin;

        let token = localStorage.getItem('tvdoor_token');
        let playlist = [];
        let idx = 0;
        let isPlaying = false;
        let fabricCanvas = null;
        let clockTimer = null;

        // Relógio na status bar
        setInterval(() => {
            document.getElementById('now-label').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        // Init
        function init() {
            if (token) {
                document.getElementById('pairing-screen').remove();
                startSync();
            }
        }

        // === PAREAMENTO ===
        async function doParear() {
            const code = document.getElementById('code-input').value.trim().toUpperCase();
            if (code.length < 4) { showPairError('Digite o código completo.'); return; }

            document.getElementById('pair-error').style.display = 'none';
            document.getElementById('pair-loading').style.display = 'block';
            document.querySelector('.pair-btn').disabled = true;

            try {
                const res = await fetch(`${BASE_URL}/tvdoor/api/pair/${code}`);
                const data = await res.json();

                if (data.success && data.token) {
                    localStorage.setItem('tvdoor_token', data.token);
                    token = data.token;
                    document.getElementById('pairing-screen').remove();
                    setStatus('Pareado: ' + data.name, true);
                    startSync();
                } else {
                    showPairError(data.message || 'Código inválido ou já utilizado.');
                }
            } catch (e) {
                showPairError('Erro de conexão. Verifique a rede.');
            }

            document.getElementById('pair-loading').style.display = 'none';
            document.querySelector('.pair-btn').disabled = false;
        }

        function showPairError(msg) {
            const el = document.getElementById('pair-error');
            el.innerText = '❌ ' + msg;
            el.style.display = 'block';
            document.getElementById('pair-loading').style.display = 'none';
        }

        document.getElementById('code-input')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') doParear();
        });

        // === SINCRONIZAÇÃO ===
        async function startSync() {
            setStatus('Sincronizando...', false);
            try {
                const res = await fetch(`${BASE_URL}/tvdoor/api/sync`, {
                    headers: { 'X-Device-Token': token }
                });

                if (res.status === 401) {
                    localStorage.removeItem('tvdoor_token');
                    location.reload();
                    return;
                }

                const data = await res.json();

                if (data.success && data.playlist && data.playlist.length > 0) {
                    const syncSec = data.config?.sync_interval || 60;
                    // Reinicia playlist apenas se mudou
                    const newHash = JSON.stringify(data.playlist);
                    if (JSON.stringify(playlist) !== newHash) {
                        playlist = data.playlist;
                        idx = 0;
                        isPlaying = false;
                    }
                    setStatus('Online · ' + playlist.length + ' item(s) na playlist', true);
                    if (!isPlaying) { isPlaying = true; playNext(); }
                    setTimeout(startSync, syncSec * 1000);
                } else {
                    setStatus('Sem programação agendada para agora', true);
                    playlist = [];
                    isPlaying = false;
                    showIdle();
                    setTimeout(startSync, 30000);
                }
            } catch (e) {
                setStatus('Sem conexão. Tentando em 30s...', false);
                setTimeout(startSync, 30000);
            }
        }

        // === REPRODUÇÃO DA PLAYLIST ===
        function playNext() {
            if (playlist.length === 0) { showIdle(); isPlaying = false; return; }

            const item = playlist[idx % playlist.length];
            const screen = document.getElementById('screen');

            // Oculta canvas Fabric se estava ativo
            hideFabric();
            screen.innerHTML = '';
            animateProgress(0);

            if (item.type && item.type.includes('Media')) {
                playMedia(item, screen);
            } else if (item.type && item.type.includes('Layout')) {
                playLayout(item, screen);
            } else if (item.type && item.type.includes('Campaign')) {
                playCampaign(item, screen);
            } else {
                next();
            }
        }

        function next() {
            idx = (idx + 1) % (playlist.length || 1);
            playNext();
        }

        // --- Mídia (imagem/vídeo) ---
        function playMedia(item, screen) {
            const dur = (item.duration || 10) * 1000;
            if (item.media_type === 'video') {
                const video = document.createElement('video');
                video.src = item.media_url;
                video.className = 'media-item';
                video.autoplay = true;
                video.muted = false;
                video.onended = next;
                screen.appendChild(video);
                animateProgress(dur);
            } else {
                const img = document.createElement('img');
                img.src = item.media_url;
                img.className = 'media-item';
                screen.appendChild(img);
                animateProgress(dur);
                setTimeout(next, dur);
            }
        }

        // --- Layout via Fabric.js ---
        function playLayout(item, screen) {
            const dur = (item.duration || 15) * 1000;

            // Pega o JSON do Fabric.js
            let fabricData = item.layout_fabric;
            if (!fabricData) { next(); return; }

            // Pode vir como string ou objeto
            if (typeof fabricData === 'string') {
                try { fabricData = JSON.parse(fabricData); } catch (e) { next(); return; }
            }

            // Verifica se tem a estrutura fabric aninhada (o editor salva assim)
            const canvasData = fabricData.fabric || fabricData;

            const wrapper = document.getElementById('fabric-wrapper');
            const canvasEl = document.getElementById('fabric-canvas');

            // Dimensões do layout
            const lw = fabricData.width || canvasData.width || 1920;
            const lh = fabricData.height || canvasData.height || 1080;

            // Escala para preencher a tela mantendo proporção
            const scaleX = window.innerWidth / lw;
            const scaleY = window.innerHeight / lh;
            const scale = Math.min(scaleX, scaleY);

            const dispW = Math.round(lw * scale);
            const dispH = Math.round(lh * scale);

            canvasEl.width = lw;
            canvasEl.height = lh;

            wrapper.style.display = 'block';
            wrapper.style.width = dispW + 'px';
            wrapper.style.height = dispH + 'px';
            wrapper.style.left = Math.round((window.innerWidth - dispW) / 2) + 'px';
            wrapper.style.top = Math.round((window.innerHeight - dispH) / 2) + 'px';

            // Destrói canvas anterior se existir
            if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; }

            fabricCanvas = new fabric.Canvas('fabric-canvas', {
                selection: false,
                interactive: false,
                width: lw,
                height: lh,
            });

            // Define o background
            if (canvasData.background) {
                fabricCanvas.setBackgroundColor(canvasData.background, fabricCanvas.renderAll.bind(fabricCanvas));
            }

            // Carrega objetos
            fabricCanvas.loadFromJSON(canvasData, () => {
                // Desabilita interatividade
                fabricCanvas.getObjects().forEach(obj => {
                    obj.selectable = false;
                    obj.evented = false;
                });

                // Escala o canvas no DOM
                const canvasWrapper = fabricCanvas.wrapperEl;
                canvasWrapper.style.transform = `scale(${scale})`;
                canvasWrapper.style.transformOrigin = 'top left';

                fabricCanvas.renderAll();
                activateFabricClocks();
            });

            animateProgress(dur);
            if (clockTimer) clearInterval(clockTimer);
            clockTimer = setInterval(activateFabricClocks, 1000);

            setTimeout(() => {
                hideFabric();
                next();
            }, dur);
        }

        function activateFabricClocks() {
            if (!fabricCanvas) return;
            fabricCanvas.getObjects().forEach(obj => {
                if (obj.data && obj.data.type === 'clock') {
                    obj.set('text', new Date().toLocaleTimeString('pt-BR'));
                }
            });
            fabricCanvas.renderAll();
        }

        function hideFabric() {
            if (clockTimer) { clearInterval(clockTimer); clockTimer = null; }
            const wrapper = document.getElementById('fabric-wrapper');
            wrapper.style.display = 'none';
            if (fabricCanvas) { fabricCanvas.dispose(); fabricCanvas = null; }
        }

        // --- Campanha ---
        function playCampaign(item, screen) {
            const dur = (item.duration || 15) * 1000;
            if (item.media_url) {
                const img = document.createElement('img');
                img.src = item.media_url;
                img.className = 'media-item';
                screen.appendChild(img);
            } else {
                screen.innerHTML = '<div style="text-align:center;opacity:0.5;font-size:2rem;padding:40px;">📢 Campanha em exibição</div>';
            }
            if (item.audio_url) { new Audio(item.audio_url).play().catch(() => { }); }
            animateProgress(dur);
            setTimeout(next, dur);
        }

        // --- Idle ---
        function showIdle() {
            hideFabric();
            document.getElementById('screen').innerHTML =
                '<div style="text-align:center;opacity:0.3;"><div style="font-size:4rem">📺</div><p style="margin-top:10px;font-size:1.2rem">Sem programação no momento</p></div>';
        }

        // === UTILITÁRIOS ===
        function animateProgress(durationMs) {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            setTimeout(() => {
                bar.style.transition = `width ${durationMs}ms linear`;
                bar.style.width = '100%';
            }, 50);
        }

        function setStatus(msg, online) {
            document.getElementById('status-label').innerHTML =
                `<span class="status-dot ${online ? 'online' : ''}"></span> ${msg}`;
        }

        init();
    </script>
</body>

</html>
